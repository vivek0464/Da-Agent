# Fly.io deployment config — free tier (3 shared VMs, 256 MB RAM each)
# Deploy: fly launch (first time) or fly deploy (redeploy)
# Secrets: fly secrets set KEY=value KEY2=value2

app = "dia-backend"
primary_region = "sin"  # Singapore — change to "bom" (Mumbai) or closest region

[build]
  # Fly auto-detects Python via requirements.txt

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # keep always-on (important for voice WS)
  auto_start_machines = true
  min_machines_running = 1

[env]
  PORT = "8000"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
